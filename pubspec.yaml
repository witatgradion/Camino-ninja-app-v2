name: camino_ninja_flutter
description: camino.ninja mobile app
version: 2.2.405+202405

publish_to: none

environment:
  sdk: '>=3.8.0 <4.0.0'
  flutter: 3.35.6

dependencies:
  analytics_services:
    path: packages/analytics_services
  bloc: ^9.1.0
  cached_network_image: ^3.4.1
  community_material_icon: ^5.9.55
  connectivity_plus: ^7.0.0
  core:
    path: packages/core
  cupertino_icons: ^1.0.8
  device_info_plus: ^12.3.0
  equatable: ^2.0.7
  firebase_analytics: ^12.1.0
  firebase_app_check: ^0.4.1+3
  firebase_core: ^4.3.0
  firebase_crashlytics: ^5.0.6
  firebase_messaging: ^16.1.0
  flutter:
    sdk: flutter
  flutter_bloc: ^9.1.1
  flutter_localizations:
    sdk: flutter
  flutter_native_splash: ^2.4.2
  flutter_rating_bar: ^4.0.1
  font_awesome_flutter: ^10.8.0
  flutter_svg: ^2.2.3
  geolocator: ^14.0.2
  get_it: ^9.2.0
  go_router: ^17.0.1
  mapbox_maps_flutter: ^2.4.0
  latlong2: ^0.9.0
  image: ^4.3.0
  image_picker: ^1.2.1
  intl: ^0.20.2
  modal_bottom_sheet: ^3.0.0
  package_info_plus: ^8.1.1
  path: ^1.9.0
  path_provider: ^2.1.5
  remote_data:
    path: packages/remote_data
  repository:
    path: packages/repository
  scrollable_positioned_list: ^0.3.8
  share_plus: ^12.0.1
  shared_preferences: ^2.5.4
  storage:
    path: packages/storage
  url_launcher: ^6.3.2
  super_tooltip: ^2.0.9
  collection: ^1.19.1
  photo_view: ^0.15.0
  auto_size_text: ^3.0.0
  map_launcher: ^4.4.2
  lottie: ^3.3.2
  dio: ^5.9.0
  syncfusion_flutter_charts: ^32.1.19
  fl_chart: ^1.1.1
  in_app_review: ^2.0.11
  sensors_plus: ^7.0.0
  app_badge_plus: ^1.2.7
  app_settings: ^7.0.0
  google_sign_in: ^7.2.0
  firebase_auth: ^6.1.3
  sign_in_with_apple: ^7.0.1
  crypto: ^3.0.5
  flutter_dotenv: ^6.0.0
  animations: ^2.1.0
  dotted_line: ^3.2.3
  table_calendar: ^3.2.0
  timeago: ^3.7.1
  diacritic: ^0.1.6
  internet_connection_checker_plus: ^2.9.1
  flutter_slidable: ^4.0.3
  logger: ^2.6.2
  qr_flutter: ^4.1.0
  mobile_scanner: ^7.1.4
  permission_handler: ^12.0.1
  pretty_qr_code:
    git:
      url: https://github.com/brianlam28/flutter_pretty_qr.git
      ref: feature/circle-finder-patterns
  gal: ^2.3.2
  flutter_quill: ^11.5.0
  flutter_quill_extensions: ^11.0.0
  chottu_link: ^1.0.19

dev_dependencies:
  bloc_test: ^10.0.0
  flutter_test:
    sdk: flutter
  melos: ^6.3.2
  mocktail: ^1.0.4
  very_good_analysis: ^10.0.0

flutter:
  uses-material-design: true
  generate: true
  assets:
    - .env.development
    - .env.staging
    - .env.production
    - assets/
    - assets/flags/
    - assets/lottie/
  fonts:
    - family: Montserrat
      fonts:
        - asset: fonts/montserrat_regular.ttf
        - asset: fonts/montserrat_bold.ttf
          weight: 700
        - asset: fonts/montserrat_italic.ttf
          style: italic
        - asset: fonts/montserrat_bold_italic.ttf
          weight: 700
          style: italic
        - asset: fonts/montserrat_semi_bold.ttf
          weight: 600
        - asset: fonts/montserrat_semi_bold_italic.ttf
          weight: 600
          style: italic

flutter_native_splash:
  color: "#333333"
  image: assets/camino_logo.png
  android_12:
    image: assets/camino_logo.png
    icon_background_color: "#222222"
  web: false

