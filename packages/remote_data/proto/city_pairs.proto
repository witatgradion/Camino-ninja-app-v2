syntax = "proto3";

package pb;

option go_package = "camino-ninja-backend-go/internal/proto/go/pb";

// CityPairDetail represents a single end city option with percentage
message CityPairDetail {
    int32 end_city_id = 1;
    string end_city_name = 2;
    float percentage = 3;
    int32 pair_count = 4;
    float distance_km = 5;
}

// CityPairsForStartCity is the response for pairs from a start city
message CityPairsForStartCity {
    int32 start_city_id = 1;
    string start_city_name = 2;
    int32 total_plans = 3;
    repeated CityPairDetail pairs = 4;
}

// CityPairsExport is the full export for offline use
message CityPairsExport {
    int64 calculated_at = 1;
    int32 total_pairs = 2;
    map<string, CityPairsForStartCity> pairs = 3; // key is start_city_id as string
}
