name: Re-deploy dev AAB to Play (internal)

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag whose AAB to re-deploy (e.g. v2.2.400+202400-development)'
        required: true
        type: string

jobs:
  redeploy:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v6

    - name: Download AAB from release
      run: |
        mkdir -p build/app/outputs/bundle/developmentRelease
        gh release download "${{ inputs.tag }}" \
          --repo "${{ github.repository }}" \
          --pattern 'app-development-release.aab' \
          --dir build/app/outputs/bundle/developmentRelease
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Deploy to Google Play (internal testing)
      uses: r0adkll/upload-google-play@v1
      with:
        serviceAccountJsonPlainText: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
        packageName: ninja.camino.app.dev
        releaseFiles: build/app/outputs/bundle/developmentRelease/app-development-release.aab
        tracks: internal
