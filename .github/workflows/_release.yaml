name: camino_ninja_flutter release (reusable)

on:
  workflow_call:
    inputs:
      flavor:
        description: 'Flutter flavor (development|staging|production)'
        required: true
        type: string
      main_target:
        description: 'Entrypoint dart file (e.g. lib/main_development.dart)'
        required: true
        type: string
      release_tag_suffix:
        description: 'Suffix appended to the release tag (development|staging|production)'
        required: true
        type: string
      build_appbundle:
        description: 'Whether to build an Android appbundle (.aab) in addition to the APK'
        required: false
        type: boolean
        default: false
      build_apk:
        description: 'Whether to build the Android APK'
        required: false
        type: boolean
        default: true
      build_ios:
        description: 'Whether to build the iOS IPA / archive'
        required: false
        type: boolean
        default: true
      deploy_to_play:
        description: 'Whether to upload the AAB to Google Play internal testing'
        required: false
        type: boolean
        default: false
      deploy_to_testflight:
        description: 'Whether to upload the IPA to TestFlight'
        required: false
        type: boolean
        default: false
      package_name:
        description: 'Android package name targeted by the Play upload (required when deploy_to_play=true)'
        required: false
        type: string
        default: ''
      ios_provisioning_profile:
        description: 'Manually-managed App Store provisioning profile name for the active flavor (required when deploy_to_testflight=true)'
        required: false
        type: string
        default: ''

jobs:
  build:
    runs-on: macos-latest
    steps:
    - name: Clone repository
      uses: actions/checkout@v4

    - name: Select Xcode 26
      if: ${{ inputs.build_ios }}
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: latest-stable

    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version-file: pubspec.yaml

    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'zulu'
        cache: gradle

    - name: Install Android NDK 28.0.12674087
      run: |
        yes | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" --licenses > /dev/null
        "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" "ndk;28.0.12674087"

    - name: Install dependencies
      run: flutter pub get

    - name: Create keystore directory
      run: mkdir android/keystore

    - name: Decode Keystore Properties
      run: echo ${{ secrets.KEY_PROPERTIES }} | base64 -d > android/keystore.properties

    - name: Decode Release Keystore
      run: echo ${{ secrets.RELEASE_KEYSTORE }} | base64 -d > android/keystore/release.jks

    - name: Decode .env.development
      run: echo ${{ secrets.ENV_DEVELOPMENT }} | base64 -d > .env.development

    - name: Decode .env.staging
      run: echo ${{ secrets.ENV_STAGING }} | base64 -d > .env.staging

    - name: Decode .env.production
      run: echo ${{ secrets.ENV_PRODUCTION }} | base64 -d > .env.production

    - name: Build APK
      if: ${{ inputs.build_apk }}
      run: flutter build apk --release --flavor ${{ inputs.flavor }} --target ${{ inputs.main_target }}

    - name: Build appBundle
      if: ${{ inputs.build_appbundle }}
      run: flutter build appbundle --release --flavor ${{ inputs.flavor }} --target ${{ inputs.main_target }}

    - name: Import iOS distribution certificate
      if: ${{ inputs.deploy_to_testflight }}
      uses: apple-actions/import-codesign-certs@v3
      with:
        p12-file-base64: ${{ secrets.IOS_DISTRIBUTION_CERT_P12_BASE64 }}
        p12-password: ${{ secrets.IOS_DISTRIBUTION_CERT_PASSWORD }}

    - name: Configure App Store Connect API key
      if: ${{ inputs.deploy_to_testflight }}
      env:
        API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
        API_PRIVATE_KEY: ${{ secrets.APP_STORE_CONNECT_API_PRIVATE_KEY }}
      run: |
        mkdir -p ~/.appstoreconnect/private_keys
        printf '%s' "$API_PRIVATE_KEY" > ~/.appstoreconnect/private_keys/AuthKey_${API_KEY_ID}.p8

    - name: Download iOS App Store provisioning profile
      if: ${{ inputs.deploy_to_testflight }}
      uses: apple-actions/download-provisioning-profiles@v3
      with:
        bundle-id: ${{ inputs.package_name }}
        profile-type: IOS_APP_STORE
        issuer-id: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
        api-key-id: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
        api-private-key: ${{ secrets.APP_STORE_CONNECT_API_PRIVATE_KEY }}

    - name: Build Flutter iOS (release, no-codesign)
      if: ${{ inputs.build_ios && inputs.deploy_to_testflight }}
      run: flutter build ios --release --no-codesign --flavor ${{ inputs.flavor }} --target ${{ inputs.main_target }}

    - name: Log signing identities (debug)
      if: ${{ inputs.build_ios && inputs.deploy_to_testflight }}
      run: security find-identity -v -p codesigning

    - name: Archive iOS app (manual signing)
      if: ${{ inputs.build_ios && inputs.deploy_to_testflight }}
      run: |
        xcodebuild \
          -workspace ios/Runner.xcworkspace \
          -scheme ${{ inputs.flavor }} \
          -sdk iphoneos \
          -archivePath build/ios/archive/Runner.xcarchive \
          archive \
          CODE_SIGN_STYLE=Manual \
          DEVELOPMENT_TEAM=2FFFS4AXF2 \
          PROVISIONING_PROFILE_SPECIFIER="${{ inputs.ios_provisioning_profile }}" \
          CODE_SIGN_IDENTITY="Apple Distribution"

    - name: Generate per-flavor ExportOptions.plist
      if: ${{ inputs.build_ios && inputs.deploy_to_testflight }}
      run: |
        cat > /tmp/ExportOptions.plist <<EOF
        <?xml version="1.0" encoding="UTF-8"?>
        <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
        <plist version="1.0">
        <dict>
            <key>method</key>
            <string>app-store</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>teamID</key>
            <string>2FFFS4AXF2</string>
            <key>signingCertificate</key>
            <string>Apple Distribution</string>
            <key>provisioningProfiles</key>
            <dict>
                <key>${{ inputs.package_name }}</key>
                <string>${{ inputs.ios_provisioning_profile }}</string>
            </dict>
            <key>uploadBitcode</key>
            <false/>
            <key>uploadSymbols</key>
            <true/>
            <key>destination</key>
            <string>export</string>
        </dict>
        </plist>
        EOF

    - name: Export IPA
      if: ${{ inputs.build_ios && inputs.deploy_to_testflight }}
      run: |
        xcodebuild \
          -exportArchive \
          -archivePath build/ios/archive/Runner.xcarchive \
          -exportPath build/ios/ipa \
          -exportOptionsPlist /tmp/ExportOptions.plist

    - name: Build IPA (unsigned)
      if: ${{ inputs.build_ios && !inputs.deploy_to_testflight }}
      run: flutter build ipa --release --flavor ${{ inputs.flavor }} --target ${{ inputs.main_target }} --no-codesign

    - name: Compress Archives and IPAs
      if: ${{ inputs.build_ios }}
      run: |
        cd build
        tar -czf ios_build.tar.gz ios

    - name: Upload APK Artifact
      if: ${{ inputs.build_apk }}
      uses: actions/upload-artifact@v4
      with:
        name: apk
        path: build/app/outputs/flutter-apk/app-${{ inputs.flavor }}-release.apk

    - name: Upload AAB Artifact
      if: ${{ inputs.build_appbundle }}
      uses: actions/upload-artifact@v4
      with:
        name: aab
        path: build/app/outputs/bundle/${{ inputs.flavor }}Release/app-${{ inputs.flavor }}-release.aab

    - name: Upload iOS Artifact
      if: ${{ inputs.build_ios }}
      uses: actions/upload-artifact@v4
      with:
        name: ios
        path: build/ios_build.tar.gz

    - name: Extract version from pubspec.yaml
      id: extract_version
      run: |
        version=$(grep '^version: ' pubspec.yaml | cut -d ' ' -f 2 | tr -d '\r')
        echo "VERSION=$version" >> $GITHUB_ENV

    - name: Compose release artifacts list
      id: artifacts
      run: |
        files=()
        if [[ "${{ inputs.build_apk }}" == "true" ]]; then
          files+=("build/app/outputs/flutter-apk/app-${{ inputs.flavor }}-release.apk")
        fi
        if [[ "${{ inputs.build_appbundle }}" == "true" ]]; then
          files+=("build/app/outputs/bundle/${{ inputs.flavor }}Release/app-${{ inputs.flavor }}-release.aab")
        fi
        if [[ "${{ inputs.build_ios }}" == "true" ]]; then
          files+=("build/ios_build.tar.gz")
        fi
        IFS=,; echo "list=${files[*]}" >> "$GITHUB_OUTPUT"

    - name: Create Release
      uses: ncipollo/release-action@v1
      with:
        artifacts: ${{ steps.artifacts.outputs.list }}
        tag: v${{ env.VERSION }}-${{ inputs.release_tag_suffix }}
        token: ${{ secrets.PAT_TOKEN }}

    - name: Deploy to Google Play (internal testing)
      if: ${{ inputs.deploy_to_play }}
      uses: r0adkll/upload-google-play@v1
      with:
        serviceAccountJsonPlainText: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
        packageName: ${{ inputs.package_name }}
        releaseFiles: build/app/outputs/bundle/${{ inputs.flavor }}Release/app-${{ inputs.flavor }}-release.aab
        tracks: internal

    - name: Resolve IPA path
      if: ${{ inputs.deploy_to_testflight }}
      id: find_ipa
      run: |
        ipa=$(ls build/ios/ipa/*.ipa | head -n1)
        echo "Found IPA: $ipa"
        echo "path=$ipa" >> "$GITHUB_OUTPUT"

    - name: Deploy to TestFlight
      if: ${{ inputs.deploy_to_testflight }}
      uses: apple-actions/upload-testflight-build@v5
      with:
        app-path: ${{ steps.find_ipa.outputs.path }}
        issuer-id: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
        api-key-id: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
        api-private-key: ${{ secrets.APP_STORE_CONNECT_API_PRIVATE_KEY }}
