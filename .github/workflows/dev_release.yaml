name: camino_ninja_flutter (development)

on:
  workflow_dispatch:
    inputs:
      skip_android:
        description: 'Skip Android (AAB build + Play upload)'
        type: boolean
        default: false
      skip_ios:
        description: 'Skip iOS (IPA build + TestFlight upload)'
        type: boolean
        default: false

jobs:
  build_development:
    uses: ./.github/workflows/_release.yaml
    with:
      flavor: development
      main_target: lib/main_development.dart
      release_tag_suffix: development
      build_appbundle: ${{ inputs.skip_android != true }}
      build_apk: false
      build_ios: ${{ inputs.skip_ios != true }}
      deploy_to_play: ${{ inputs.skip_android != true }}
      deploy_to_testflight: ${{ inputs.skip_ios != true }}
      package_name: ninja.camino.app.dev
      ios_provisioning_profile: Camino Ninja DEV AppStoreConnect
    secrets: inherit
